<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TaxOne Desktop — Sign In</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1e293b;
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 32px;
            -webkit-app-region: drag;
            user-select: none;
        }
        .logo {
            width: 56px; height: 56px;
            background: #e8a020;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700; color: #1e293b;
            margin-bottom: 12px;
        }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 28px; }
        .login-content {
            width: 100%;
            -webkit-app-region: no-drag;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: #e8a020; }
        input::placeholder { color: #475569; }
        .hint {
            font-size: 11px;
            color: #64748b;
            margin-top: -12px;
            margin-bottom: 16px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #e8a020;
            color: #1e293b;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: #d4911c; }
        .btn-primary:disabled { opacity: 0.5; cursor: default; }
        .btn-secondary {
            width: 100%;
            padding: 11px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-secondary:hover { background: #334155; }
        .btn-secondary:disabled { opacity: 0.5; cursor: default; }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            gap: 12px;
            font-size: 12px;
            color: #475569;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #334155;
        }
        .token-section {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.2s ease;
        }
        .token-section.open {
            max-height: 300px;
            opacity: 1;
        }
        .toggle-token {
            width: 100%;
            padding: 8px;
            border: none;
            background: transparent;
            color: #64748b;
            font-size: 12px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .toggle-token:hover { color: #94a3b8; }
        .error {
            background: #7f1d1d;
            color: #fca5a5;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 16px;
            display: none;
        }
        .help {
            margin-top: 20px;
            font-size: 11px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }
        .success-state {
            display: none;
            text-align: center;
            width: 100%;
        }
        .success-check {
            width: 64px;
            height: 64px;
            background: #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin: 0 auto 16px;
        }
        .success-msg {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .success-url {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        .success-close {
            padding: 8px 24px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: transparent;
            color: #94a3b8;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-app-region: no-drag;
        }
        .success-close:hover {
            background: #334155;
        }
    </style>
</head>
<body>
    <div class="logo">T</div>
    <h1>TaxOne Desktop</h1>
    <p class="subtitle">Connect to your TaxOne account</p>

    <div class="login-content" id="loginContent">
        <label for="serverUrl">Server URL</label>
        <input type="url" id="serverUrl" placeholder="https://taxone.cpa" required>
        <p class="hint">Your firm's TaxOne URL</p>

        <div class="error" id="error"></div>

        <button class="btn-primary" id="browserSignInBtn" onclick="signInWithBrowser()">
            Sign in with Browser
        </button>

        <div class="divider">&mdash; or &mdash;</div>

        <button class="toggle-token" onclick="toggleTokenSection()">
            Paste token manually &#9662;
        </button>

        <div class="token-section" id="tokenSection">
            <label for="token">API Token</label>
            <input type="password" id="token" placeholder="Paste your token here">
            <p class="hint">Generate a token in Firm Settings &rarr; Integrations &rarr; Desktop App</p>

            <button class="btn-secondary" id="tokenSubmitBtn" onclick="connectWithToken()">
                Connect
            </button>
        </div>
    </div>

    <div class="success-state" id="successState">
        <div class="success-check">&#10003;</div>
        <div class="success-msg">Connected to TaxOne</div>
        <div class="success-url" id="successUrl"></div>
        <button class="success-close" onclick="window.close()">Close</button>
    </div>

    <p class="help">
        Need help? Open TaxOne in your browser and go to<br>
        Firm Settings &rarr; Integrations &rarr; Desktop App
    </p>

    <script>
        const errorEl = document.getElementById('error');
        const browserSignInBtn = document.getElementById('browserSignInBtn');
        const tokenSubmitBtn = document.getElementById('tokenSubmitBtn');

        async function init() {
            const serverUrl = await window.taxone.getServerUrl();
            if (serverUrl) {
                document.getElementById('serverUrl').value = serverUrl;
            }
        }
        init();

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }

        function hideError() {
            errorEl.style.display = 'none';
        }

        function getServerUrl() {
            return document.getElementById('serverUrl').value.trim();
        }

        function toggleTokenSection() {
            document.getElementById('tokenSection').classList.toggle('open');
        }

        async function signInWithBrowser() {
            hideError();
            const serverUrl = getServerUrl();
            if (!serverUrl) {
                showError('Enter your TaxOne URL first.');
                return;
            }
            const url = serverUrl.replace(/\/+$/, '') + '/desktop/authorize';
            window.taxone.openExternal(url);
        }

        async function connectWithToken() {
            hideError();
            const serverUrl = getServerUrl();
            const token = document.getElementById('token').value.trim();

            if (!serverUrl) {
                showError('Enter your TaxOne URL first.');
                return;
            }
            if (!token) {
                showError('Enter your API token.');
                return;
            }

            tokenSubmitBtn.disabled = true;
            tokenSubmitBtn.textContent = 'Connecting...';

            const result = await window.taxone.login({ serverUrl, token });

            if (result.success) {
                document.getElementById('loginContent').style.display = 'none';
                document.querySelector('.help').style.display = 'none';
                document.getElementById('successUrl').textContent = serverUrl;
                document.getElementById('successState').style.display = 'block';
                setTimeout(() => window.close(), 2000);
            } else {
                showError(result.error);
                tokenSubmitBtn.disabled = false;
                tokenSubmitBtn.textContent = 'Connect';
            }
        }
    </script>
</body>
</html>
